name: UIEffectSnapshotDemo

on:
  push:
    branches:
      - main
    paths:
      - "UIEffectSnaphotDemo/**"
      - ".github/workflows/UIEffectSnapshotDemo.yml"

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE_2020_1_5 }}
  projectPath: UIEffectSnapshotDemo____
  unityVersion: 2020.1.5f1
  targetPlatform: WebGL

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # - uses: webbertakken/unity-builder@v1.5
      #   with:
      #     projectPath: ${{ env.projectPath }}
      #     unityVersion: ${{ env.unityVersion }}
      #     targetPlatform: ${{ env.targetPlatform }}
      #     buildMethod: SimpleBuildInterface.Build
      #     customParameters: '-out /tmp/unity_build'
      
      - name: Commit files
        run: |
          mkdir /tmp/unity_build
          echo hogehoge2 > /tmp/unity_build/hogehoge
          echo fugafuga2 > fugafuga

          git checkout -f gh-pages
          git clean -fd

          # git status

          rm -rf ${{ env.projectPath }}
          mv /tmp/unity_build ${{ env.projectPath }}

          # git commit -a -m 'chore: auto deploy ${{ env.projectPath }}'


      - uses: actions-js/push@master
        with:
          github_token: ${{ github.token }}
          branch: gh-pages

      # - uses: actions/upload-artifact@v2
      #   with:
      #     path: ${{ env.projectPath }}_build
