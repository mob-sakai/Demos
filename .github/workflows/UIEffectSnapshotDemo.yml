      #     unityVersion: ${{ env.unityVersion }}
      #     targetPlatform: ${{ env.targetPlatform }}
      #     buildMethod: SimpleBuildInterface.Build
      #     customParameters: '-out ${{ env.projectPath }}_build'

      - name: Commit files
        run: |
          mkdir ${{ env.projectPath }}_build
          echo hogehoge2 > ${{ env.projectPath }}_build/hogehoge
          echo fugafuga2 > fugafuga

          # git checkout -f gh-pages
          # git clean -fd

          # rm -rf ${{ env.projectPath }}
          # mv /tmp/unity_build ${{ env.projectPath }}
          # git commit -a -m 'chore: auto deploy ${{ env.projectPath }}'

      - uses: actions/checkout@v2
        with:
          ref: gh-pages

      - uses: github-actions-x/commit@v2.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          push-branch: 'gh-pages'
          commit-message: 'chore: auto deploy'
