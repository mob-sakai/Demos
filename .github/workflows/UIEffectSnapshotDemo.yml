name: UIEffectSnapshotDemo

on:
  push:
    branches:
      - main
    paths:
      - "UIEffectSnaphotDemo/**"
      - ".github/workflows/UIEffectSnapshotDemo.yml"

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE_2020_1_5 }}
  projectPath: UIEffectSnapshotDemo____
  unityVersion: 2020.1.5f1
  targetPlatform: WebGL

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: gableroux/unity3d:2020.1.5f1

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # - uses: webbertakken/unity-builder@v1.5
      #   with:
      #     projectPath: ${{ env.projectPath }}
      #     unityVersion: ${{ env.unityVersion }}
      #     targetPlatform: ${{ env.targetPlatform }}
      #     buildMethod: SimpleBuildInterface.Build
      #     customParameters: '-out /tmp/unity_build'

      # - uses: actions/upload-artifact@v2
      #   with:
      #     path: /tmp/unity_build

      - name: Commit files
        run: |
          mkdir /tmp/unity_build
          echo hogehoge2 > /tmp/unity_build/hogehoge
          echo fugafuga2 > fugafuga

          # clean checkout
          git checkout -f gh-pages && git clean -fd

          # update build path
          rm -rf ${{ env.projectPath }} && mv /tmp/unity_build ${{ env.projectPath }}

          git add ${{ env.projectPath }}
          git commit -a -m 'chore: auto deploy ${{ env.projectPath }}'

      # - uses: actions/checkout@v2
      #   with:
      #     ref: gh-pages
      #     clean: false

      # - uses: github-actions-x/commit@v2.7
      #   with:
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
      #     push-branch: 'gh-pages'
      #     commit-message: 'chore: auto deploy'
      #     # force-add: 'true'
      #     files: '${{ env.projectPath }}_build/**'
      #     # name: commiter name
      #     # email: my.github@email.com

      - uses: ad-m/github-push-action@master
        with:
          github_token: ${{ github.token }}
          branch: gh-pages
