name: UIEffectSnapshotDemo

on:
  push:
    branches:
      - main
    paths:
      - "UIEffectSnaphotDemo/**"
      - ".github/workflows/UIEffectSnapshotDemo.yml"

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE_2020_1_5 }}
  projectPath: UIEffectSnapshotDemo____
  unityVersion: 2020.1.5f1
  targetPlatform: WebGL

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

        # with:
        #   fetch-depth: 0
      # - uses: webbertakken/unity-builder@v1.5
      #   with:
